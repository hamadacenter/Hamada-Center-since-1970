<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamada Center | المتجر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#111111; --black2:#1C1C1C; --card-bg:#242424;
  --grey:#909090; --grey-light:#C8C8C8; --white:#FFFFFF;
  --pink:#E8A0B0; --pink-deep:#D4748A; --pink-soft:rgba(232,160,176,.13);
  --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.14);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:"Tajawal",sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
img{max-width:100%;display:block;}
.reveal{opacity:0;transform:translateY(22px);transition:opacity .5s ease,transform .5s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
header{background:rgba(17,17,17,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--line-strong);padding:13px 4%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.header-left{display:flex;align-items:center;gap:11px;}
.logo{font-family:"Playfair Display",serif;font-size:1.3rem;font-weight:900;color:var(--white);display:flex;align-items:center;gap:6px;direction:ltr;text-decoration:none;}
.logo em{color:var(--pink);font-style:normal;}
.logo-img{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.icon-btn{background:rgba(255,255,255,.07);border:1px solid var(--line-strong);color:var(--grey-light);width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:.2s;text-decoration:none;flex-shrink:0;}
.icon-btn:hover{background:var(--pink-soft);border-color:var(--pink);color:var(--pink);}
.menu-btn{background:rgba(255,255,255,.07);border:1px solid var(--line-strong);width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:.2s;flex-shrink:0;}
.menu-btn:hover{background:var(--pink-soft);border-color:var(--pink);}
.menu-btn span{display:block;width:16px;height:1.5px;background:var(--white);border-radius:2px;transition:.3s;}
.menu-btn.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg);}
.menu-btn.open span:nth-child(2){opacity:0;}
.menu-btn.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg);}
.header-right{display:flex;align-items:center;gap:8px;}
.lang-btn{background:rgba(255,255,255,.07);border:1px solid var(--line-strong);color:var(--grey-light);padding:7px 15px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700;transition:.2s;}
.lang-btn:hover{border-color:var(--pink);color:var(--pink);}
.cart-btn{background:var(--pink);border:none;color:var(--black);padding:9px 18px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:900;font-size:.88rem;display:flex;align-items:center;gap:7px;transition:.2s;}
.cart-btn:hover{background:var(--pink-deep);}
.cart-count{background:var(--black);color:var(--white);border-radius:50%;width:20px;height:20px;font-size:.7rem;display:inline-flex;align-items:center;justify-content:center;font-weight:900;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;opacity:0;transition:opacity .25s;}
.drawer-overlay.open{display:block;opacity:1;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(300px,88vw);background:var(--black2);z-index:301;transform:translateX(110%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--line-strong);}
html[dir="ltr"] .drawer{right:auto;left:0;transform:translateX(-110%);border-left:none;border-right:1px solid var(--line-strong);}
.drawer.open{transform:translateX(0);}
.drawer-head{background:var(--black);border-bottom:1px solid var(--line);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.drawer-head h2{font-size:.98rem;font-weight:800;color:var(--white);}
.close-drawer{background:none;border:none;color:var(--grey);font-size:1.2rem;cursor:pointer;transition:color .2s;line-height:1;}
.close-drawer:hover{color:var(--pink);}
.drawer-body{flex:1;overflow-y:auto;padding:10px 12px;}
.drawer-cat{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:.18s;font-weight:700;font-size:.87rem;color:var(--grey-light);}
.drawer-cat:hover{background:var(--pink-soft);color:var(--white);}
.drawer-cat.active{background:var(--pink-soft);color:var(--pink);border-right:2px solid var(--pink);}
html[dir="ltr"] .drawer-cat.active{border-right:none;border-left:2px solid var(--pink);}
.drawer-cat-icon{font-size:1.05rem;width:22px;text-align:center;flex-shrink:0;}
.drawer-group-header{display:flex;align-items:center;justify-content:space-between;padding:13px 10px;border-radius:12px;cursor:pointer;font-weight:800;font-size:.95rem;color:var(--white);transition:.18s;margin-top:4px;}
.drawer-group-header:hover{background:var(--pink-soft);}
.drawer-group-header.has-active{color:var(--pink);}
.drawer-group-arrow{font-size:.8rem;color:var(--grey);transition:transform .25s;display:inline-block;}
.drawer-group-header.open .drawer-group-arrow{transform:rotate(90deg);}
.drawer-group-subs{display:none;padding-right:8px;}
html[dir="ltr"] .drawer-group-subs{padding-right:0;padding-left:8px;}
.drawer-group-subs.open{display:block;}
.shop-bar{padding:22px 5% 0;max-width:1320px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.shop-title{font-family:"Playfair Display",serif;font-size:1.55rem;font-weight:900;color:var(--white);}
.shop-title em{color:var(--pink);font-style:normal;}
.product-count{font-size:.76rem;color:var(--grey);font-weight:700;background:var(--card-bg);padding:6px 14px;border-radius:999px;border:1px solid var(--line);}
.search-filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 5% 0;max-width:1320px;margin:0 auto;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-input{width:100%;background:var(--card-bg);border:1px solid var(--line-strong);border-radius:999px;padding:10px 18px 10px 44px;font-family:"Tajawal",sans-serif;font-size:.9rem;color:var(--white);transition:border-color .2s;outline:none;}
html[dir="rtl"] .search-input{padding:10px 44px 10px 18px;}
.search-input::placeholder{color:var(--grey);}
.search-input:focus{border-color:var(--pink);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey);pointer-events:none;}
html[dir="rtl"] .search-icon{left:auto;right:14px;}
.price-filter-btn{background:var(--card-bg);border:1px solid var(--line-strong);color:var(--grey-light);padding:10px 18px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.85rem;display:flex;align-items:center;gap:7px;transition:.2s;white-space:nowrap;}
.price-filter-btn:hover,.price-filter-btn.active{border-color:var(--pink);color:var(--pink);}
.pd-overlay{position:fixed;inset:0;z-index:180;display:none;}
.pd-overlay.open{display:block;}
.price-dropdown{position:absolute;top:60px;left:5%;right:5%;max-width:400px;background:var(--black2);border:1px solid var(--line-strong);border-radius:16px;padding:18px 20px;z-index:181;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.price-dropdown.open{display:block;}
.pd-title{font-weight:800;font-size:.9rem;margin-bottom:14px;color:var(--white);}
.pd-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.pd-input{width:100px;background:var(--black);border:1px solid var(--line-strong);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:.88rem;color:var(--white);text-align:center;outline:none;transition:border-color .2s;}
.pd-input:focus{border-color:var(--pink);}
.pd-sep{color:var(--grey);font-weight:700;}
.pd-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.pd-preset{background:var(--card-bg);border:1px solid var(--line-strong);color:var(--grey-light);padding:5px 12px;border-radius:999px;font-family:inherit;font-size:.78rem;cursor:pointer;transition:.2s;}
.pd-preset:hover{border-color:var(--pink);color:var(--pink);}
.pd-actions{display:flex;gap:8px;}
.pd-clear{flex:1;background:transparent;border:1px solid var(--line-strong);color:var(--grey-light);padding:9px;border-radius:10px;font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer;transition:.2s;}
.pd-clear:hover{border-color:var(--pink);color:var(--pink);}
.pd-apply{flex:2;background:var(--pink);border:none;color:var(--black);padding:9px;border-radius:10px;font-family:inherit;font-weight:800;font-size:.85rem;cursor:pointer;transition:.2s;}
.pd-apply:hover{background:var(--pink-deep);}
.filters-wrap{padding:13px 5% 0;max-width:1320px;margin:0 auto;}
.filters{display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.filter-btn{border:1px solid var(--line-strong);background:transparent;color:var(--grey-light);padding:8px 18px;border-radius:999px;font-family:inherit;font-weight:700;font-size:.82rem;cursor:pointer;transition:.2s;white-space:nowrap;flex-shrink:0;}
.filter-btn:hover{border-color:var(--pink);color:var(--pink);}
.filter-btn.active{background:var(--pink);color:var(--black);border-color:var(--pink);}
.cat-banners-wrap{padding:14px 5% 0;max-width:1320px;margin:0 auto;}
.cat-banners{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
.cat-banners::-webkit-scrollbar{display:none;}
.cat-banner{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:10px 14px;border-radius:16px;border:1.5px solid var(--line-strong);background:var(--card-bg);transition:all .22s;min-width:74px;}
.cat-banner:hover,.cat-banner.active{border-color:var(--pink);background:var(--pink-soft);}
.cat-banner-img{width:48px;height:48px;border-radius:12px;background:var(--black2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;overflow:hidden;}
.cat-banner-img img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.cat-banner-label{font-size:.7rem;font-weight:800;color:var(--grey-light);text-align:center;white-space:nowrap;transition:color .2s;}
.cat-banner:hover .cat-banner-label,.cat-banner.active .cat-banner-label{color:var(--pink);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px;padding:20px 5% 100px;max-width:1320px;margin:0 auto;min-height:200px;}
.card{background:var(--card-bg);border-radius:18px;overflow:hidden;border:1px solid var(--line);transition:transform .28s,box-shadow .28s,border-color .28s;display:flex;flex-direction:column;position:relative;}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 44px rgba(0,0,0,.55);border-color:var(--line-strong);}
.card.sold-out-card{opacity:.6;}
.card-img{aspect-ratio:1/1;overflow:hidden;background:#1a1a1a;position:relative;cursor:zoom-in;}
.img-track{display:flex;width:100%;height:100%;transition:transform .38s cubic-bezier(.4,0,.2,1);}
.img-slide{min-width:100%;height:100%;object-fit:cover;flex-shrink:0;pointer-events:none;}
.card-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2;}
.cdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:.2s;}
.cdot.active{background:var(--pink);transform:scale(1.45);}
.c-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:1px solid var(--line-strong);color:var(--white);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;z-index:2;transition:.2s;opacity:0;}
.card:hover .c-arrow{opacity:1;}
.c-arrow:hover{background:var(--pink);border-color:var(--pink);color:var(--black);}
.c-arrow.cprev{right:8px;} .c-arrow.cnext{left:8px;}
html[dir="ltr"] .c-arrow.cprev{right:auto;left:8px;} html[dir="ltr"] .c-arrow.cnext{left:auto;right:8px;}
.badge-row{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:3;}
html[dir="ltr"] .badge-row{right:auto;left:10px;}
.badge{font-size:.64rem;font-weight:900;padding:4px 10px;border-radius:999px;box-shadow:0 2px 10px rgba(0,0,0,.4);white-space:nowrap;}
.badge-disc{background:var(--pink);color:var(--black);transform:rotate(-4deg);}
.badge-new{background:#3B82F6;color:#fff;}
.badge-sold{background:#EF4444;color:#fff;}
.card-body{padding:14px;display:flex;flex-direction:column;gap:6px;flex:1;}
.card-cat{font-size:.64rem;color:var(--pink);font-weight:800;text-transform:uppercase;letter-spacing:.9px;}
.card-title{font-size:.95rem;font-weight:800;color:var(--white);line-height:1.3;}
.card-desc{font-size:.78rem;color:var(--grey);flex:1;line-height:1.5;}
.price-row{display:flex;align-items:baseline;gap:8px;margin-top:4px;}
.price-new{font-size:1.2rem;font-weight:900;color:var(--white);font-family:"Playfair Display",serif;}
.price-old{font-size:.85rem;color:var(--grey);text-decoration:line-through;}
.variant-select{border:1px solid var(--line-strong);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:.84rem;background:var(--black2);color:var(--white);cursor:pointer;}
.variant-select:focus{outline:none;border-color:var(--pink);}
.add-cart-btn{margin-top:8px;background:var(--white);color:var(--black);border:none;border-radius:12px;padding:12px;font-family:inherit;font-weight:900;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s,transform .15s;}
.add-cart-btn:active{transform:scale(.97);}
.add-cart-btn:hover,.add-cart-btn.added{background:var(--pink);}
.btn-soldout{background:rgba(255,255,255,.07)!important;color:var(--grey)!important;cursor:not-allowed!important;border:1px solid var(--line);}
.fav-btn{margin-top:6px;background:transparent;color:var(--grey);border:1px solid var(--line-strong);border-radius:12px;padding:10px;font-family:inherit;font-weight:800;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
.fav-btn:hover{border-color:var(--pink);color:var(--pink);}
.fav-btn.faved{background:var(--pink-soft);border-color:var(--pink);color:var(--pink);}
.empty{text-align:center;padding:80px 20px;color:var(--grey);grid-column:1/-1;}
.empty h3{color:var(--white);margin-bottom:8px;font-family:"Playfair Display",serif;font-size:1.5rem;}
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:700;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px;}
.lb-overlay.open{display:flex;}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.09);border:1px solid var(--line-strong);color:var(--white);border-radius:50%;width:42px;height:42px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;z-index:2;}
.lb-close:hover{background:var(--pink);border-color:var(--pink);color:var(--black);}
.lb-wrap{position:relative;max-width:min(600px,90vw);display:flex;align-items:center;justify-content:center;}
.lb-img{max-width:100%;max-height:72vh;border-radius:14px;object-fit:contain;user-select:none;display:block;}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:1px solid var(--line-strong);color:var(--white);border-radius:50%;width:44px;height:44px;font-size:1.3rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;}
.lb-arrow:hover{background:var(--pink);border-color:var(--pink);color:var(--black);}
.lb-arrow.lprev{right:-58px;} .lb-arrow.lnext{left:-58px;}
html[dir="ltr"] .lb-arrow.lprev{right:auto;left:-58px;} html[dir="ltr"] .lb-arrow.lnext{left:auto;right:-58px;}
.lb-dots-row{display:flex;gap:8px;margin-top:16px;}
.lb-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:.2s;}
.lb-dot.active{background:var(--pink);}
.lb-counter{color:var(--grey);font-size:.82rem;margin-top:8px;}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:350;display:none;opacity:0;transition:opacity .25s;}
.cart-overlay.open{display:block;opacity:1;}
.cart-sidebar{position:fixed;top:0;left:0;bottom:0;width:min(400px,100vw);background:var(--black2);z-index:351;transform:translateX(-110%);transition:transform .3s ease;display:flex;flex-direction:column;border-right:1px solid var(--line-strong);}
html[dir="rtl"] .cart-sidebar{left:auto;right:0;transform:translateX(110%);border-right:none;border-left:1px solid var(--line-strong);}
.cart-sidebar.open{transform:translateX(0)!important;}
.cart-head{background:var(--black);border-bottom:1px solid var(--line);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.cart-head h2{font-size:1.05rem;font-weight:800;color:var(--white);}
.close-cart{background:none;border:none;color:var(--grey);font-size:1.4rem;cursor:pointer;transition:color .2s;line-height:1;}
.close-cart:hover{color:var(--pink);}
.cart-items{flex:1;overflow-y:auto;padding:16px;}
.cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.cart-item img{width:60px;height:60px;object-fit:cover;border-radius:10px;flex-shrink:0;background:#1a1a1a;}
.ci-info{flex:1;}
.ci-name{font-weight:800;font-size:.9rem;margin-bottom:2px;color:var(--white);}
.ci-variant{font-size:.75rem;color:var(--grey);margin-bottom:4px;}
.ci-price{color:var(--pink);font-weight:900;font-family:"Playfair Display",serif;font-size:.95rem;}
.ci-qty{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{background:var(--card-bg);border:1px solid var(--line-strong);color:var(--white);width:28px;height:28px;border-radius:7px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;transition:.2s;}
.qty-btn:hover{border-color:var(--pink);color:var(--pink);}
.qty-num{font-weight:700;min-width:20px;text-align:center;color:var(--white);}
.remove-item{background:none;border:none;color:#EF4444;cursor:pointer;font-size:.78rem;margin-right:auto;}
html[dir="ltr"] .remove-item{margin-right:0;margin-left:auto;}
.cart-empty-msg{text-align:center;padding:50px 20px;color:var(--grey);}
.cart-footer{padding:16px 20px;border-top:1px solid var(--line);}
.cart-total{display:flex;justify-content:space-between;font-weight:800;font-size:1.05rem;margin-bottom:14px;color:var(--white);}
.cart-total span:last-child{color:var(--pink);}
.checkout-btn{width:100%;background:var(--pink);color:var(--black);border:none;padding:14px;border-radius:13px;font-family:inherit;font-weight:900;font-size:1rem;cursor:pointer;transition:background .2s;}
.checkout-btn:hover{background:var(--pink-deep);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--black2);border:1px solid var(--line-strong);border-radius:20px;padding:28px;width:min(500px,100%);max-height:90vh;overflow-y:auto;}
.modal h2{font-family:"Playfair Display",serif;color:var(--white);font-size:1.4rem;margin-bottom:6px;}
.modal .subtitle{font-size:.85rem;color:var(--grey);margin-bottom:20px;}
.order-summary{background:var(--black);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:20px;max-height:200px;overflow-y:auto;}
.os-item{display:flex;justify-content:space-between;font-size:.85rem;padding:4px 0;border-bottom:1px solid var(--line);color:var(--grey-light);}
.os-item:last-child{border-bottom:none;}
.os-total{display:flex;justify-content:space-between;font-weight:900;font-size:1rem;margin-top:10px;color:var(--pink);}
.field-group{margin-bottom:16px;}
.field-group label{display:block;font-weight:700;font-size:.85rem;margin-bottom:6px;color:var(--grey-light);}
.field-group input{width:100%;border:1.5px solid var(--line-strong);border-radius:11px;padding:12px 14px;font-family:inherit;font-size:.92rem;background:var(--black);color:var(--white);transition:border-color .2s;}
.field-group input:focus{outline:none;border-color:var(--pink);}
.field-group input.err{border-color:#EF4444;}
.err-msg{color:#EF4444;font-size:.75rem;margin-top:4px;display:none;}
.err-msg.show{display:block;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions button{flex:1;padding:13px;border-radius:12px;font-family:inherit;font-weight:800;font-size:.92rem;cursor:pointer;transition:.2s;}
.btn-cancel{background:var(--card-bg);border:1px solid var(--line-strong);color:var(--grey-light);}
