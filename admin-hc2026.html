<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم Hamada Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF7F4;--emerald:#1F4538;--emerald-light:#2F6651;
    --ink:#2A2420;--gold:#C9A961;--line:#EAE0D8;
    --danger:#a13c3c;--danger-bg:#f6dada;--blue:#2563eb;--blue-bg:#dbeafe;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Tajawal',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-box{background:#fff;border-radius:18px;padding:36px 28px;max-width:380px;width:100%;box-shadow:0 14px 40px rgba(31,69,56,.12);text-align:center;}
  .login-box h1{font-size:1.3rem;color:var(--emerald);margin-bottom:6px;}
  .login-box p{font-size:.85rem;color:#a8a098;margin-bottom:20px;}
  .login-box input{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-family:inherit;font-size:1rem;text-align:center;margin-bottom:14px;background:var(--cream);}
  .login-box button{width:100%;padding:14px;background:var(--emerald);color:#fff;border:none;border-radius:12px;font-family:inherit;font-weight:800;font-size:1rem;cursor:pointer;}
  .login-box button:hover{background:var(--emerald-light);}
  .login-error{color:var(--danger);font-size:.85rem;margin-top:10px;display:none;}
  .config-error{color:var(--danger);font-size:.8rem;margin-top:14px;padding:10px;background:var(--danger-bg);border-radius:8px;display:none;}
  .admin-app{display:none;}
  .admin-header{background:var(--emerald);color:#fff;padding:18px 5%;display:flex;justify-content:space-between;align-items:center;}
  .admin-header h1{font-size:1.2rem;}
  .header-actions{display:flex;align-items:center;gap:10px;}
  .logout-btn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:.85rem;}
  .orders-icon-btn{position:relative;background:var(--gold);color:var(--emerald);border:none;padding:8px 16px;border-radius:8px;font-family:inherit;font-weight:800;cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:6px;}
  .orders-badge{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border-radius:50%;width:20px;height:20px;font-size:.68rem;font-weight:900;display:none;align-items:center;justify-content:center;}
  .orders-badge.show{display:flex;}
  .orders-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:none;}
  .orders-overlay.open{display:block;}
  .orders-panel{position:fixed;top:0;left:0;bottom:0;width:min(520px,100vw);background:#fff;z-index:601;transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.15);}
  .orders-panel.open{transform:translateX(0);}
  .orders-panel-head{background:var(--emerald);color:#fff;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .orders-panel-head h2{font-size:1.1rem;}
  .close-orders{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;}
  .orders-toolbar{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}
  .filter-pill{border:1px solid var(--line);background:transparent;color:var(--ink);padding:6px 14px;border-radius:999px;font-family:inherit;font-weight:700;font-size:.78rem;cursor:pointer;transition:.2s;}
  .filter-pill.active{background:var(--emerald);color:#fff;border-color:var(--emerald);}
  .orders-list{flex:1;overflow-y:auto;padding:14px 16px;}
  .order-card{background:var(--cream);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--line);}
  .order-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .order-id{font-size:.72rem;color:#a8a098;}
  .order-date{font-size:.72rem;color:#a8a098;margin-top:2px;}
  .order-status{font-size:.72rem;font-weight:800;padding:4px 10px;border-radius:999px;}
  .status-جديد{background:#dcfce7;color:#166534;}
  .status-قيد-التنفيذ{background:#fef9c3;color:#854d0e;}
  .status-مكتمل{background:#dbeafe;color:#1e40af;}
  .status-ملغي{background:var(--danger-bg);color:var(--danger);}
  .order-items{margin-bottom:10px;}
  .order-item-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.84rem;}
  .order-item-row:last-child{border-bottom:none;}
  .order-item-img{width:40px;height:40px;border-radius:8px;object-fit:cover;background:#f4ede7;flex-shrink:0;}
  .order-item-info{flex:1;}
  .order-item-price{font-weight:800;color:var(--emerald);white-space:nowrap;}
  .order-total-row{display:flex;justify-content:space-between;font-weight:900;font-size:.95rem;color:var(--emerald);margin-top:8px;}
  .order-customer{font-size:.82rem;color:#555;margin-top:8px;line-height:1.7;}
  .order-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .status-btn{flex:1;padding:8px 10px;border-radius:8px;font-family:inherit;font-weight:700;font-size:.78rem;cursor:pointer;border:1px solid var(--line);background:#fff;transition:.2s;min-width:80px;}
  .status-btn:hover{background:var(--emerald);color:#fff;border-color:var(--emerald);}
  .status-btn.del{color:var(--danger);border-color:var(--danger-bg);background:var(--danger-bg);}
  .status-btn.del:hover{background:var(--danger);color:#fff;}
  .orders-empty{text-align:center;padding:50px 20px;color:#a8a098;}
  .admin-body{max-width:680px;margin:0 auto;padding:28px 20px 60px;}
  .tabs{display:flex;gap:8px;margin-bottom:22px;}
  .tab{flex:1;padding:12px;text-align:center;border-radius:10px;background:#fff;cursor:pointer;font-weight:700;font-size:.9rem;border:1px solid var(--line);}
  .tab.active{background:var(--emerald);color:#fff;border-color:var(--emerald);}
  .section{display:none;}
  .section.active{display:block;}
  .form-card{background:#fff;border-radius:16px;padding:22px;border:1px solid var(--line);}
  label{display:block;font-weight:700;font-size:.85rem;margin:14px 0 6px;}
  label:first-child{margin-top:0;}
  input[type=text], input[type=number], select, textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:.92rem;background:var(--cream);}
  textarea{min-height:75px;resize:vertical;}
  input[type=file]{width:100%;}
  .hint{font-size:.78rem;color:#a8a098;margin-top:4px;}
  .variant-row{display:flex;gap:8px;margin-top:8px;align-items:center;}
  .variant-row input{flex:1;}
  .small-btn{background:var(--line);border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700;}
  .save-btn{width:100%;margin-top:20px;background:var(--emerald);color:#fff;border:none;border-radius:12px;padding:15px;font-weight:800;font-size:1rem;cursor:pointer;font-family:inherit;}
  .save-btn:disabled{opacity:.6;cursor:not-allowed;}
  .cancel-edit-btn{width:100%;margin-top:8px;background:transparent;color:#a8a098;border:none;padding:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:.85rem;}
  .images-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
  .img-thumb-wrap{position:relative;width:90px;height:90px;border-radius:10px;overflow:hidden;border:2px solid var(--line);background:#f4ede7;flex-shrink:0;}
  .img-thumb-wrap img{width:100%;height:100%;object-fit:cover;}
  .img-thumb-wrap .remove-img{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:14px;line-height:22px;text-align:center;font-weight:700;}
  .img-thumb-wrap .main-badge{position:absolute;bottom:3px;right:3px;background:var(--emerald);color:#fff;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:5px;}
  .add-more-img-btn{width:90px;height:90px;border-radius:10px;border:2px dashed var(--line);background:var(--cream);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:.75rem;color:#a8a098;font-family:inherit;font-weight:700;flex-shrink:0;}
  .add-more-img-btn span{font-size:1.4rem;}
  .product-item{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;}
  .product-item img{width:52px;height:52px;border-radius:8px;object-fit:cover;background:#f4ede7;}
  .product-item .info{flex:1;font-size:.85rem;min-width:0;}
  .product-item .info b{display:block;margin-bottom:2px;}
  .product-item .actions{display:flex;gap:6px;flex-shrink:0;}
  .danger-btn{background:var(--danger-bg);color:var(--danger);border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.8rem;}
  .empty-state{text-align:center;padding:40px 20px;color:#a8a098;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--emerald);color:#fff;padding:14px 26px;border-radius:999px;font-weight:700;font-size:.9rem;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:700;display:none;max-width:90%;text-align:center;}
  .toast.error{background:var(--danger);}
  .live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:999px;font-size:.78rem;font-weight:700;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .status-pills{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .status-pill{flex:1;min-width:90px;padding:11px 10px;border-radius:10px;text-align:center;border:1.5px solid var(--line);background:var(--cream);cursor:pointer;font-family:inherit;font-weight:800;font-size:.82rem;color:var(--ink);transition:.2s;}
  .status-pill.active-normal{background:var(--emerald);color:#fff;border-color:var(--emerald);}
  .status-pill.active-new{background:var(--blue);color:#fff;border-color:var(--blue);}
  .status-pill.active-soldout{background:var(--danger);color:#fff;border-color:var(--danger);}
  .badge-tag{display:inline-block;font-size:.65rem;font-weight:800;padding:2px 7px;border-radius:999px;margin-right:4px;}
  .badge-tag.tag-new{background:var(--blue-bg);color:var(--blue);}
  .badge-tag.tag-soldout{background:var(--danger-bg);color:var(--danger);}
  .cat-picker-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .cat-pill{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;border:1.5px solid var(--line);background:var(--cream);cursor:pointer;font-family:inherit;font-weight:700;font-size:.8rem;color:var(--ink);transition:.2s;}
  .cat-pill:hover{border-color:var(--emerald);background:rgba(31,69,56,.06);}
  .cat-pill.active{background:var(--emerald);color:#fff;border-color:var(--emerald);}
  .cat-pill-icon{font-size:1rem;}
  .cat-group-label{width:100%;margin:14px 0 6px;font-size:.78rem;font-weight:900;color:var(--emerald);letter-spacing:.5px;border-bottom:1px solid var(--line);padding-bottom:4px;}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>لوحة تحكم Hamada Center</h1>
    <p>هذه الصفحة خاصة بالإدارة فقط</p>
    <input type="password" id="passwordInput" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">دخول</button>
    <div class="login-error" id="loginError">كلمة المرور غير صحيحة</div>
    <div class="config-error" id="configError"></div>
  </div>
</div>

<div class="admin-app" id="adminApp">
  <div class="admin-header">
    <h1>لوحة التحكم</h1>
    <div class="header-actions">
      <span class="live-badge"><span class="live-dot"></span> متصل مباشر</span>
      <button class="orders-icon-btn" onclick="openOrders()">🧾 الفواتير <span class="orders-badge" id="ordersBadge">0</span></button>
      <button class="logout-btn" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('add')">إضافة منتج</div>
      <div class="tab" onclick="switchTab('manage')">إدارة المنتجات</div>
    </div>
    <div class="section active" id="tab-add">
      <div class="form-card">
        <label>اسم المنتج</label>
        <input type="text" id="f-name" placeholder="مثال: عطر Amaran Qamarain">
        <label>التصنيف</label>
        <input type="hidden" id="f-cat" value="مكياج - روج">
        <div class="cat-picker-wrap" id="catPicker"></div>
        <label>الوصف المختصر</label>
        <textarea id="f-desc" placeholder="وصف قصير يظهر تحت اسم المنتج"></textarea>
        <label>حالة المنتج</label>
        <div class="status-pills" id="statusPills">
          <button type="button" class="status-pill" id="pill-normal" onclick="setStatus('normal')">عادي</button>
          <button type="button" class="status-pill" id="pill-new" onclick="setStatus('new')">🆕 جديد</button>
          <button type="button" class="status-pill" id="pill-soldout" onclick="setStatus('soldout')">⛔ نفذ من المخزون</button>
        </div>
        <div class="hint">حدد حالة المنتج — تظهر كشارة على صورة المنتج بالموقع</div>
        <label>صور المنتج</label>
        <div class="hint" style="margin-bottom:8px;">يمكنك إضافة أكثر من صورة — الصورة الأولى هي الرئيسية</div>
        <input type="file" id="f-img-upload" accept="image/*" multiple style="display:none" onchange="handleImagesUpload(event)">
        <div class="images-grid" id="images-grid">
          <button type="button" class="add-more-img-btn" onclick="document.getElementById('f-img-upload').click()"><span>+</span>إضافة صورة</button>
        </div>
        <label>الأسعار / الأحجام</label>
        <div id="variants-container"></div>
        <button class="small-btn" onclick="addVariantRow()" style="margin-top:8px;">+ إضافة حجم/سعر</button>
        <button class="save-btn" id="saveBtn" onclick="saveProduct()">حفظ المنتج</button>
        <button class="cancel-edit-btn" id="cancelEditBtn" style="display:none;" onclick="clearForm()">إلغاء التعديل</button>
      </div>
    </div>
    <div class="section" id="tab-manage">
      <div id="product-list"></div>
    </div>
  </div>
</div>

<div class="orders-overlay" id="ordersOverlay" onclick="closeOrders()"></div>
<div class="orders-panel" id="ordersPanel">
  <div class="orders-panel-head"><h2>🧾 الفواتير والطلبات</h2><button class="close-orders" onclick="closeOrders()">✕</button></div>
  <div class="orders-toolbar">
    <button class="filter-pill active" onclick="filterOrders('all',this)">الكل</button>
    <button class="filter-pill" onclick="filterOrders('جديد',this)">🟢 جديد</button>
    <button class="filter-pill" onclick="filterOrders('قيد-التنفيذ',this)">🟡 جاري</button>
    <button class="filter-pill" onclick="filterOrders('مكتمل',this)">🔵 مكتمل</button>
    <button class="filter-pill" onclick="filterOrders('ملغي',this)">🔴 ملغي</button>
  </div>
  <div class="orders-list" id="ordersList"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
/* ============================================================
   التصنيفات: قسم رئيسي ← تصنيف فرعي
   القيمة المحفوظة: "القسم - الفرعي"
   نفس الأيقونات بالضبط بدون أي تغيير
   ============================================================ */
var ADMIN_GROUPS = [
  {
    name:"مكياج", icon:"💄",
    cats:[
      {v:"مكياج - روج",       i:"💄", label:"روج"},
      {v:"مكياج - فاونديشن",  i:"🌸", label:"فاونديشن"},
      {v:"مكياج - باليت",     i:"🎨", label:"باليت"},
      {v:"مكياج - كونتور",   i:"✨", label:"كونتور"},
      {v:"مكياج - هايلايتر", i:"💫", label:"هايلايتر"},
      {v:"مكياج - بودرة",    i:"🪄", label:"بودرة"},
      {v:"مكياج - مسكرا",    i:"👁️", label:"مسكرا"},
      {v:"مكياج - كحل",      i:"🖊️", label:"كحل"},
      {v:"مكياج - إيشادو",   i:"🌈", label:"إيشادو"}
    ]
  },
  {
    name:"عناية بالجسم", icon:"🧴",
    cats:[
      {v:"عناية بالجسم - عطور",      i:"🌹", label:"عطور"},
      {v:"عناية بالجسم - غسول جسم",  i:"🚿", label:"غسول جسم"},
      {v:"عناية بالجسم - كريم جسم",  i:"🧴", label:"كريم جسم"},
      {v:"عناية بالجسم - واقي شمس",  i:"☀️", label:"واقي شمس"},
      {v:"عناية بالجسم - سيروم",     i:"💧", label:"سيروم"},
      {v:"عناية بالجسم - مرطب وجه",  i:"🌿", label:"مرطب وجه"},
      {v:"عناية بالجسم - غسول وجه",  i:"🫧", label:"غسول وجه"}
    ]
  },
  {
    name:"عناية بالشعر", icon:"💇",
    cats:[
      {v:"عناية بالشعر - شامبو",    i:"🧼", label:"شامبو"},
      {v:"عناية بالشعر - بلسم",     i:"💆", label:"بلسم"},
      {v:"عناية بالشعر - ماسك شعر", i:"🎭", label:"ماسك شعر"},
      {v:"عناية بالشعر - زيت شعر",  i:"🫙", label:"زيت شعر"},
      {v:"عناية بالشعر - كريم شعر", i:"🎀", label:"كريم شعر"}
    ]
  },
  {
    name:"أجهزة", icon:"⚡",
    cats:[
      {v:"أجهزة - مكواة شعر",    i:"♨️", label:"مكواة شعر"},
      {v:"أجهزة - سشوار",        i:"💨", label:"سشوار"},
      {v:"أجهزة - أجهزة تجميل",  i:"🔌", label:"أجهزة تجميل"}
    ]
  },
  {
    name:"إكسسوارات", icon:"💎",
    cats:[
      {v:"إكسسوارات - إكسسوارات", i:"💎", label:"إكسسوارات"}
    ]
  }
];

var CAT_MAP = {
  'روج':'مكياج - روج','فاونديشن':'مكياج - فاونديشن','باليت':'مكياج - باليت',
  'كونتور':'مكياج - كونتور','هايلايتر':'مكياج - هايلايتر','بودرة':'مكياج - بودرة',
  'مسكرا':'مكياج - مسكرا','كحل':'مكياج - كحل','ايلاينر':'مكياج - كحل','إيشادو':'مكياج - إيشادو',
  'عطور':'عناية بالجسم - عطور','غسول جسم':'عناية بالجسم - غسول جسم','كريم جسم':'عناية بالجسم - كريم جسم',
  'واقي شمس':'عناية بالجسم - واقي شمس','سيروم':'عناية بالجسم - سيروم',
  'مرطب وجه':'عناية بالجسم - مرطب وجه','غسول وجه':'عناية بالجسم - غسول وجه',
  'شامبو':'عناية بالشعر - شامبو','بلسم':'عناية بالشعر - بلسم',
  'ماسك شعر':'عناية بالشعر - ماسك شعر','زيت شعر':'عناية بالشعر - زيت شعر',
  'كريم شعر':'عناية بالشعر - كريم شعر',
  'مكواة شعر':'أجهزة - مكواة شعر','مكواة':'أجهزة - مكواة شعر',
  'سشوار':'أجهزة - سشوار','أجهزة تجميل':'أجهزة - أجهزة تجميل',
  'إكسسوارات':'إكسسوارات - إكسسوارات',
  'عناية بالجسم':'عناية بالجسم - كريم جسم','عناية بالبشرة':'عناية بالجسم - سيروم',
  'عناية بالشعر':'عناية بالشعر - شامبو','أخرى':'إكسسوارات - إكسسوارات'
};

function renderCatPicker(selected){
  var el = document.getElementById("catPicker");
  if(!el) return;
  var sel = selected || document.getElementById("f-cat").value || "مكياج - روج";
  var h = "";
  for(var g = 0; g < ADMIN_GROUPS.length; g++){
    var group = ADMIN_GROUPS[g];
    h += '<div class="cat-group-label">' + group.icon + ' ' + group.name + '</div>';
    for(var c = 0; c < group.cats.length; c++){
      var cat = group.cats[c];
      var isAct = cat.v === sel;
      var safeVal = cat.v.replace(/'/g, "\\'");
      h += '<button type="button" class="cat-pill' + (isAct ? ' active' : '') + '" onclick="pickCat(\'' + safeVal + '\')">' +
           '<span class="cat-pill-icon">' + cat.i + '</span>' + cat.label + '</button>';
    }
  }
  el.innerHTML = h;
}

function pickCat(val){
  document.getElementById("f-cat").value = val;
  renderCatPicker(val);
}

/* ---------- CONFIG GUARD ---------- */
(function checkConfig(){
  var missing = [];
  if(typeof SUPABASE_URL === 'undefined' || !SUPABASE_URL || SUPABASE_URL.indexOf('ضعي_هنا') > -1) missing.push('SUPABASE_URL');
  if(typeof SUPABASE_ANON_KEY === 'undefined' || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.indexOf('ضعي_هنا') > -1) missing.push('SUPABASE_ANON_KEY');
  if(typeof ADMIN_PASSWORD === 'undefined' || !ADMIN_PASSWORD) missing.push('ADMIN_PASSWORD');
  if(missing.length > 0){
    var el = document.getElementById('configError');
    el.style.display = 'block';
    el.textContent = 'ملف config.js غير مكتمل. تأكد من رفعه مع باقي الملفات.';
    document.querySelector('.login-box button').disabled = true;
    document.querySelector('.login-box button').style.opacity = '0.5';
  }
})();

/* ---------- AUTH ---------- */
function tryLogin(){
  var input = document.getElementById('passwordInput').value;
  if(typeof ADMIN_PASSWORD !== 'undefined' && input === ADMIN_PASSWORD){
    sessionStorage.setItem('hc_admin_auth','true');
    showAdmin();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout(){
  sessionStorage.removeItem('hc_admin_auth');
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
}

function showAdmin(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
  init();
  setTimeout(function(){
    renderCatPicker(document.getElementById('f-cat').value || 'مكياج - روج');
  }, 100);
}

if(sessionStorage.getItem('hc_admin_auth') === 'true' && typeof SUPABASE_URL !== 'undefined'){
  showAdmin();
}

window.addEventListener('load', function(){
  var picker = document.getElementById('catPicker');
  if(picker && picker.children.length === 0){
    renderCatPicker(document.getElementById('f-cat').value || 'مكياج - روج');
  }
});

/* ---------- SUPABASE ---------- */
var sb;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
catch(e) { console.error('Supabase init failed:', e); }

var products = [], orders = [], ordersFilter = 'all', editingId = null;
var variantCount = 0, uploadedImages = [], currentStatus = 'normal';

async function init(){
  await loadProducts();
  await loadOrders();
  addVariantRow();
  setStatus('normal');
}

/* ========== ORDERS ========== */
async function loadOrders(){
  try {
    var res = await sb.from('orders').select('*').order('created_at',{ascending:false});
    if(res.error){ console.warn('Orders load error:', res.error.message); return; }
    orders = res.data || [];
    updateOrdersBadge();
    renderOrders();
  } catch(e) { console.warn('Orders fetch failed:', e); }
}

function updateOrdersBadge(){
  var c = orders.filter(function(o){ return o.status === 'جديد'; }).length;
  var badge = document.getElementById('ordersBadge');
  badge.textContent = c;
  badge.classList.toggle('show', c > 0);
}

function openOrders(){
  document.getElementById('ordersOverlay').classList.add('open');
  document.getElementById('ordersPanel').classList.add('open');
  renderOrders();
}

function closeOrders(){
  document.getElementById('ordersOverlay').classList.remove('open');
  document.getElementById('ordersPanel').classList.remove('open');
}

function filterOrders(status, btn){
  ordersFilter = status;
  var pills = document.querySelectorAll('.filter-pill');
  for(var i = 0; i < pills.length; i++) pills[i].classList.remove('active');
  btn.classList.add('active');
  renderOrders();
}

function renderOrders(){
  var list = document.getElementById('ordersList');
  var filtered = ordersFilter === 'all' ? orders : orders.filter(function(o){ return o.status === ordersFilter; });
  if(filtered.length === 0){ list.innerHTML = '<div class="orders-empty">لا توجد فواتير هنا</div>'; return; }
  var h = '';
  for(var i = 0; i < filtered.length; i++){
    var o = filtered[i];
    var date = new Date(o.created_at).toLocaleString('ar-EG');
    var shortId = o.id.slice(0,8).toUpperCase();
    var statusClass = 'status-' + (o.status || 'جديد').replace(/\s/g, '-');
    var itemsHtml = '';
    var items = o.items || [];
    for(var j = 0; j < items.length; j++){
      var it = items[j];
      itemsHtml += '<div class="order-item-row">' +
        (it.img ? '<img class="order-item-img" src="' + it.img + '" onerror="this.style.display=\'none\'">' : '<div class="order-item-img"></div>') +
        '<div class="order-item-info"><div style="font-weight:700">' + escapeHtml(it.name) + '</div><div style="font-size:.75rem;color:#888">' + escapeHtml(it.variant) + ' × ' + it.qty + '</div></div>' +
        '<div class="order-item-price">' + it.price + ' ج.م</div></div>';
    }
    h += '<div class="order-card" id="order-' + o.id + '"><div class="order-card-head"><div><div class="order-id"># ' + shortId + '</div><div class="order-date">🕐 ' + date + '</div></div><span class="order-status ' + statusClass + '">' + (o.status || 'جديد') + '</span></div><div class="order-items">' + itemsHtml + '</div><div class="order-total-row"><span>الإجمالي</span><span>' + o.total + ' ج.م</span></div><div class="order-customer">📍 ' + escapeHtml(o.address || '') + '، ' + escapeHtml(o.city || '') + '<br>📞 ' + escapeHtml(o.customer_phone || '') + '</div><div class="order-actions"><button class="status-btn" onclick="setOrderStatus(\'' + o.id + '\',\'جديد\')">🟢 جديد</button><button class="status-btn" onclick="setOrderStatus(\'' + o.id + '\',\'قيد-التنفيذ\')">🟡 جاري</button><button class="status-btn" onclick="setOrderStatus(\'' + o.id + '\',\'مكتمل\')">🔵 مكتمل</button><button class="status-btn" onclick="setOrderStatus(\'' + o.id + '\',\'ملغي\')">🔴 ملغي</button><button class="status-btn del" onclick="deleteOrder(\'' + o.id + '\')">🗑 حذف</button></div></div>';
  }
  list.innerHTML = h;
}

async function setOrderStatus(id, status){
  try {
    var res = await sb.from('orders').update({status: status}).eq('id', id);
    if(res.error){ showToast('خطأ: ' + res.error.message, true); return; }
    for(var i = 0; i < orders.length; i++){
      if(orders[i].id === id){ orders[i].status = status; break; }
    }
    updateOrdersBadge();
    renderOrders();
    showToast('تم تحديث الحالة ✅');
  } catch(e) { showToast('فشل التحديث', true); }
}

async function deleteOrder(id){
  if(!confirm('هل تريد حذف هذه الفاتورة؟')) return;
  try {
    var res = await sb.from('orders').delete().eq('id', id);
    if(res.error){ showToast('خطأ: ' + res.error.message, true); return; }
    var newOrders = [];
    for(var i = 0; i < orders.length; i++){
      if(orders[i].id !== id) newOrders.push(orders[i]);
    }
    orders = newOrders;
    updateOrdersBadge();
    renderOrders();
    showToast('تم الحذف');
  } catch(e) { showToast('فشل الحذف', true); }
}

/* ========== PRODUCTS ========== */
async function loadProducts(){
  try {
    var res = await sb.from('products').select('*').order('created_at',{ascending:false});
    if(res.error){ showToast('خطأ في تحميل المنتجات: ' + res.error.message, true); return; }
    products = res.data || [];
    renderProductList();
  } catch(err) { showToast('فشل الاتصال بقاعدة البيانات', true); }
}

function switchTab(tab){
  var tabs = document.querySelectorAll('.tab');
  var sections = document.querySelectorAll('.section');
  for(var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  for(var i = 0; i < sections.length; i++) sections[i].classList.remove('active');
  if(tab === 'add'){
    tabs[0].classList.add('active');
    document.getElementById('tab-add').classList.add('active');
    var cv = document.getElementById('f-cat').value || 'مكياج - روج';
    setTimeout(function(){ renderCatPicker(cv); }, 50);
  } else {
    tabs[1].classList.add('active');
    document.getElementById('tab-manage').classList.add('active');
    renderProductList();
  }
}

function setStatus(status){
  currentStatus = status;
  document.getElementById('pill-normal').className = 'status-pill' + (status === 'normal' ? ' active-normal' : '');
  document.getElementById('pill-new').className = 'status-pill' + (status === 'new' ? ' active-new' : '');
  document.getElementById('pill-soldout').className = 'status-pill' + (status === 'soldout' ? ' active-soldout' : '');
}

function handleImagesUpload(event){
  var files = Array.from(event.target.files);
  if(!files.length) return;
  event.target.value = '';
  for(var i = 0; i < files.length; i++){
    (function(file){
      if(!file.type.startsWith('image/')){ showToast('اختر ملف صورة فقط', true); return; }
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var canvas = document.createElement('canvas');
          var maxDim = 800;
          var w = img.width, h = img.height;
          if(w > h && w > maxDim){ h = h * maxDim / w; w = maxDim; }
          else if(h > maxDim){ w = w * maxDim / h; h = maxDim; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          uploadedImages.push(canvas.toDataURL('image/jpeg', 0.8));
          renderImagesGrid();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
}

function removeImage(index){ uploadedImages.splice(index, 1); renderImagesGrid(); }

function renderImagesGrid(){
  var grid = document.getElementById('images-grid');
  var h = '';
  for(var i = 0; i < uploadedImages.length; i++){
    h += '<div class="img-thumb-wrap"><img src="' + uploadedImages[i] + '" alt=""><button type="button" class="remove-img" onclick="removeImage(' + i + ')">✕</button>' + (i === 0 ? '<span class="main-badge">رئيسية</span>' : '') + '</div>';
  }
  h += '<button type="button" class="add-more-img-btn" onclick="document.getElementById(\'f-img-upload\').click()"><span>+</span>إضافة صورة</button>';
  grid.innerHTML = h;
}

function addVariantRow(label, price, oldPrice){
  variantCount++;
  var id = 'variant-' + variantCount;
  var container = document.getElementById('variants-container');
  var row = document.createElement('div');
  row.className = 'variant-row';
  row.id = id;
  row.innerHTML = '<input type="text" placeholder="الحجم" value="' + (label || '') + '" class="v-label"><input type="number" placeholder="السعر" value="' + (price || '') + '" class="v-price"><input type="number" placeholder="السعر قبل الخصم" value="' + (oldPrice || '') + '" class="v-old"><button class="small-btn" type="button" onclick="document.getElementById(\'' + id + '\').remove()">✕</button>';
  container.appendChild(row);
}

function clearForm(){
  editingId = null;
  uploadedImages = [];
  document.getElementById('f-name').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-cat').value = 'مكياج - روج';
  renderCatPicker('مكياج - روج');
  document.getElementById('f-img-upload').value = '';
  renderImagesGrid();
  document.getElementById('variants-container').innerHTML = '';
  variantCount = 0;
  addVariantRow();
  setStatus('normal');
  document.getElementById('saveBtn').textContent = 'حفظ المنتج';
  document.getElementById('cancelEditBtn').style.display = 'none';
}

async function saveProduct(){
  var name = document.getElementById('f-name').value.trim();
  var category = document.getElementById('f-cat').value;
  var desc = document.getElementById('f-desc').value.trim();
  if(!name){ showToast('من فضلك اكتب اسم المنتج', true); return; }
  var variantRows = document.querySelectorAll('#variants-container .variant-row');
  var variants = [];
  for(var i = 0; i < variantRows.length; i++){
    var row = variantRows[i];
    var label = row.querySelector('.v-label').value.trim();
    var price = parseFloat(row.querySelector('.v-price').value);
    var oldPrice = parseFloat(row.querySelector('.v-old').value) || null;
    if(label && !isNaN(price)) variants.push({label: label, price: price, oldPrice: oldPrice});
  }
  if(variants.length === 0){ showToast('أضف سعر وحجم واحد على الأقل', true); return; }
  var saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'جاري الحفظ...';
  var imagesArray = uploadedImages.length > 0 ? uploadedImages : [];
  var mainImage = imagesArray[0] || null;
  var payload = {
    name: name, category: category, description: desc,
    image: mainImage, images: imagesArray, variants: variants,
    is_new: currentStatus === 'new',
    sold_out: currentStatus === 'soldout'
  };
  var error = null;
  try {
    var res;
    if(editingId){
      res = await sb.from('products').update(payload).eq('id', editingId);
    } else {
      res = await sb.from('products').insert(payload);
    }
    error = res.error;
  } catch(err) { error = err; }
  saveBtn.disabled = false;
  saveBtn.textContent = editingId ? 'حفظ التعديلات' : 'حفظ المنتج';
  if(error){ showToast('حدث خطأ: ' + (error.message || 'تأكد من الاتصال بالإنترنت'), true); return; }
  await loadProducts();
  clearForm();
  showToast('تم الحفظ بنجاح ✅ — يظهر على الموقع الآن فوراً');
  switchTab('manage');
}

function renderProductList(){
  var el = document.getElementById('product-list');
  if(products.length === 0){ el.innerHTML = '<div class="empty-state">لا توجد منتجات حتى الآن</div>'; return; }
  var h = '';
  for(var i = 0; i < products.length; i++){
    var p = products[i];
    var variantsText = '';
    for(var j = 0; j < (p.variants || []).length; j++){
      if(j > 0) variantsText += ' / ';
      variantsText += p.variants[j].price + 'ج';
    }
    var imgCount = (p.images || []).length;
    var imgBadge = imgCount > 1 ? ' <span style="font-size:.72rem;color:#a8a098;"> · ' + imgCount + ' صور</span>' : '';
    var tags = (p.is_new ? '<span class="badge-tag tag-new">🆕 جديد</span>' : '') + (p.sold_out ? '<span class="badge-tag tag-soldout">⛔ نفذ</span>' : '');
    h += '<div class="product-item"><img src="' + (p.image || '') + '" alt="" onerror="this.style.visibility=\'hidden\'"><div class="info"><b>' + escapeHtml(p.name) + '</b>' + tags + escapeHtml(p.category) + ' — ' + variantsText + imgBadge + '</div><div class="actions"><button class="small-btn" onclick="editProduct(\'' + p.id + '\')">تعديل</button><button class="danger-btn" onclick="deleteProduct(\'' + p.id + '\')">حذف</button></div></div>';
  }
  el.innerHTML = h;
}

function escapeHtml(str){
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function editProduct(id){
  var p = null;
  for(var i = 0; i < products.length; i++){
    if(products[i].id === id){ p = products[i]; break; }
  }
  if(!p) return;
  editingId = id;
  document.getElementById('f-name').value = p.name;
  var mappedCat = CAT_MAP[p.category] || p.category;
  document.getElementById('f-cat').value = mappedCat;
  renderCatPicker(mappedCat);
  document.getElementById('f-desc').value = p.description || '';
  uploadedImages = Array.isArray(p.images) && p.images.length > 0 ? p.images.slice() : (p.image ? [p.image] : []);
  renderImagesGrid();
  document.getElementById('variants-container').innerHTML = '';
  variantCount = 0;
  var pVariants = p.variants || [];
  for(var i = 0; i < pVariants.length; i++){
    addVariantRow(pVariants[i].label, pVariants[i].price, pVariants[i].oldPrice || '');
  }
  if(pVariants.length === 0) addVariantRow();
  setStatus(p.sold_out ? 'soldout' : (p.is_new ? 'new' : 'normal'));
  document.getElementById('saveBtn').textContent = 'حفظ التعديلات';
  document.getElementById('cancelEditBtn').style.display = 'block';
  switchTab('add');
}

async function deleteProduct(id){
  if(!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
  try {
    var res = await sb.from('products').delete().eq('id', id);
    if(res.error){ showToast('حدث خطأ: ' + res.error.message, true); return; }
    await loadProducts();
    showToast('تم الحذف');
  } catch(err) { showToast('فشل الاتصال بقاعدة البيانات', true); }
}

function showToast(msg, isError){
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = isError ? 'toast error' : 'toast';
  toast.style.display = 'block';
  setTimeout(function(){ toast.style.display = 'none'; }, 3500);
}
</script>
